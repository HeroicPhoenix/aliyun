services:
  aliyun:
    image: aliyun:latest
    container_name: aliyun
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "${JAVA_OPTS:--Xms256m -Xmx512m}"
      LOG_PATH: logs
      DATAWORKS_ACCESS_KEY_ID: "${DATAWORKS_ACCESS_KEY_ID:?DATAWORKS_ACCESS_KEY_ID is required}"
      DATAWORKS_ACCESS_KEY_SECRET: "${DATAWORKS_ACCESS_KEY_SECRET:?DATAWORKS_ACCESS_KEY_SECRET is required}"
      DATAWORKS_REGION_ID: "${DATAWORKS_REGION_ID:-cn-shanghai}"
      DATAWORKS_ENDPOINT: "${DATAWORKS_ENDPOINT:-dataworks.cn-shanghai.aliyuncs.com}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-127.0.0.1:9092}"
      KAFKA_OPERATION_TIMEOUT_MS: "${KAFKA_OPERATION_TIMEOUT_MS:-5000}"
      MAXCOMPUTE_ACCESS_KEY_ID: "${MAXCOMPUTE_ACCESS_KEY_ID:-}"
      MAXCOMPUTE_ACCESS_KEY_SECRET: "${MAXCOMPUTE_ACCESS_KEY_SECRET:-}"
      MAXCOMPUTE_ENDPOINT: "${MAXCOMPUTE_ENDPOINT:-http://service.cn-shanghai.maxcompute.aliyun.com/api}"
      MAXCOMPUTE_EXPORT_DIR: "${MAXCOMPUTE_EXPORT_DIR:-/opt/aliyun/export/maxcompute}"
      DATAHUB_ACCESS_KEY_ID: "${DATAHUB_ACCESS_KEY_ID:-}"
      DATAHUB_ACCESS_KEY_SECRET: "${DATAHUB_ACCESS_KEY_SECRET:-}"
      DATAHUB_ENDPOINT: "${DATAHUB_ENDPOINT:-https://dh-cn-shanghai.aliyuncs.com}"
      DATAHUB_OPERATION_TIMEOUT_MS: "${DATAHUB_OPERATION_TIMEOUT_MS:-5000}"
    volumes:
      - ./logs:/opt/aliyun/logs
      - ${MAXCOMPUTE_HOST_EXPORT_DIR:-./export/maxcompute}:${MAXCOMPUTE_EXPORT_DIR:-/opt/aliyun/export/maxcompute}
