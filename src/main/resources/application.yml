server:
  port: 8080

aliyun:
  dataworks:
    access-key-id: ${DATAWORKS_ACCESS_KEY_ID:}
    access-key-secret: ${DATAWORKS_ACCESS_KEY_SECRET:}
    region-id: ${DATAWORKS_REGION_ID:cn-shanghai}
    endpoint: ${DATAWORKS_ENDPOINT:dataworks.cn-shanghai.aliyuncs.com}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    operation-timeout-ms: ${KAFKA_OPERATION_TIMEOUT_MS:5000}
  maxcompute:
    access-key-id: ${MAXCOMPUTE_ACCESS_KEY_ID:}
    access-key-secret: ${MAXCOMPUTE_ACCESS_KEY_SECRET:}
    endpoint: ${MAXCOMPUTE_ENDPOINT:http://service.cn-shanghai.maxcompute.aliyun.com/api}
    export-dir: ${MAXCOMPUTE_EXPORT_DIR:/opt/aliyun/export/maxcompute}
  datahub:
    access-key-id: ${DATAHUB_ACCESS_KEY_ID:}
    access-key-secret: ${DATAHUB_ACCESS_KEY_SECRET:}
    endpoint: ${DATAHUB_ENDPOINT:https://dh-cn-shanghai.aliyuncs.com}
    operation-timeout-ms: ${DATAHUB_OPERATION_TIMEOUT_MS:5000}
